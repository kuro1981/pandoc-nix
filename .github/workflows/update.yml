name: Check for Pandoc Updates

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: Specific version to update to (optional)
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for new version
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_VERSION=$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' package.nix | head -1)
          echo "Current version: $CURRENT_VERSION"

          if [ -n "${{ github.event.inputs.version }}" ]; then
            LATEST_VERSION="${{ github.event.inputs.version }}"
          else
            LATEST_VERSION=$(gh release view --repo jgm/pandoc --json tagName -q '.tagName' || echo "")
          fi

          if [ -z "$LATEST_VERSION" ]; then
            echo "Could not fetch latest version"
            exit 0
          fi

          echo "Latest version: $LATEST_VERSION"

          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "new_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version
        if: steps.check.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION="${{ steps.check.outputs.new_version }}"
          bash ./scripts/update.sh --version "$NEW_VERSION"

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update pandoc to version ${{ steps.check.outputs.new_version }}"
          title: "chore: update pandoc to version ${{ steps.check.outputs.new_version }}"
          body: |
            ## Update Pandoc

            This PR updates Pandoc from version ${{ steps.check.outputs.current_version }} to ${{ steps.check.outputs.new_version }}.

            ### Changes
            - Updated `version` in `package.nix`
            - Updated release asset hashes in `package.nix`
            - Updated `flake.lock`

            ### Checklist
            - [ ] Build passes
            - [ ] Basic functionality tested

            ---
            *This PR was automatically generated by the update workflow.*
          branch: update-pandoc-${{ steps.check.outputs.new_version }}
          delete-branch: true
          labels: |
            dependencies
            automated

      - name: Enable Auto-Merge
        if: steps.check.outputs.update_needed == 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.create-pr.outputs.pull-request-number }} --auto --squash --delete-branch
