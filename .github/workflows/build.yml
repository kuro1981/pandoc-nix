name: Build and Cache

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    workflows: ["Check for Pandoc Updates"]
    types: [completed]
    branches: [main]

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        env:
          NIX_FIRST_BUILD_UID: 400

      - name: Ensure Nix daemon mode
        run: echo "NIX_REMOTE=daemon" >> "$GITHUB_ENV"

      - name: Restart nix-daemon on macOS
        if: runner.os == 'macOS'
        run: sudo launchctl kickstart -k system/org.nixos.nix-daemon || true

      - uses: cachix/cachix-action@v15
        if: github.ref == 'refs/heads/main' && env.CACHIX_AUTH_TOKEN != ''
        with:
          name: pandoc-nix
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Build package
        run: nix build .#pandoc --print-build-logs

      - name: Push to Cachix
        if: github.ref == 'refs/heads/main' && env.CACHIX_AUTH_TOKEN != ''
        run: |
          nix build .#pandoc --json | jq -r '.[].outputs.out' | cachix push pandoc-nix

      - name: Test pandoc
        run: |
          ./result/bin/pandoc --version
