name: Test Pull Request

on:
  pull_request:
    paths:
      - package.nix
      - flake.nix
      - flake.lock
      - .github/workflows/**
      - scripts/**

jobs:
  test-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
        env:
          NIX_FIRST_BUILD_UID: 400

      - name: Ensure Nix daemon mode
        run: echo "NIX_REMOTE=daemon" >> "$GITHUB_ENV"

      - name: Restart nix-daemon on macOS
        if: runner.os == 'macOS'
        run: sudo launchctl kickstart -k system/org.nixos.nix-daemon || true

      - name: Build package
        run: nix build .#pandoc --print-build-logs

      - name: Verify package contents
        run: test -f ./result/bin/pandoc

      - name: Run basic functionality test
        run: |
          ./result/bin/pandoc --help >/dev/null || true
          ./result/bin/pandoc --version | grep -E "pandoc"
